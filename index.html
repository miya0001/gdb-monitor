<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GeonicDB リアルタイムモニター</title>
</head>
<body>
  <!-- ログイン画面 -->
  <div class="login-overlay" id="login-overlay">
    <div class="login-box">
      <div class="type-picker-icon">&#9673;</div>
      <h2>GeonicDB Monitor</h2>
      <p>ログインしてモニターを開始</p>
      <form id="login-form">
        <input id="login-tenant" class="login-field" type="text" placeholder="テナント名（省略可）" autocomplete="organization" />
        <input id="login-email" class="login-field" type="email" placeholder="メールアドレス" required autocomplete="email" />
        <input id="login-password" class="login-field" type="password" placeholder="パスワード" required autocomplete="current-password" />
        <button type="submit" class="login-btn" id="login-btn">ログイン</button>
        <div class="login-error" id="login-error"></div>
      </form>
    </div>
  </div>

  <div id="map"></div>

  <div class="header">
    <a href="./" class="header-icon" id="header-icon">&#9673;</a>
    <div>
      <div style="display:flex;align-items:center;gap:10px">
        <h1 id="app-title">リアルタイムモニター</h1>
        <span class="ws-status"><span class="ws-dot" id="ws-dot"></span><span id="ws-label">CONNECTING</span></span>
      </div>
      <div class="subtitle">GEONICDB LIVE STREAM &mdash; DPoP AUTH</div>
    </div>
  </div>

  <div class="side-panel">
    <div class="panel-card feed-card">
      <div class="feed-header">
        <div class="feed-dot"></div>
        Live Feed
      </div>
      <div class="feed-list" id="feed-list"></div>
    </div>
    <a href="./" class="change-type-btn">&#9664; エンティティタイプを変更</a>
  </div>

  <div class="toast" id="toast"></div>

  <div class="type-overlay hidden" id="type-overlay">
    <div class="type-picker">
      <div class="type-picker-icon">&#9673;</div>
      <h2>GeonicDB Monitor</h2>
      <p>モニターするエンティティタイプを選択してください</p>
      <form id="type-form" class="type-form">
        <select id="type-input" class="login-field type-form-select" required>
          <option value="" disabled selected>読み込み中...</option>
        </select>
        <button type="submit" class="type-form-submit">Open</button>
      </form>
      <div>
        <a href="#" class="overlay-logout" onclick="handleLogout();return false">ログアウト</a>
      </div>
    </div>
  </div>

  <div class="type-overlay hidden" id="error-overlay">
    <div class="type-picker">
      <div class="type-picker-icon error-icon">&#9888;</div>
      <h2 id="error-title">エンティティが見つかりません</h2>
      <p id="error-detail"></p>
      <a href="./" class="back-link">トップに戻る</a>
    </div>
  </div>

  <!-- Geolonia Maps -->
  <script src="https://cdn.geolonia.com/v1/embed?geolonia-api-key=%VITE_GEOLONIA_API_KEY%"></script>

  <!-- アプリケーション -->
  <script type="module" src="/src/main.js"></script>
</body>
</html>
